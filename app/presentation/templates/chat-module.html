<!-- AI Chat Module - chat-module.html -->
<!-- 這是一個獨立的模組化設計，可單獨優化和複用 -->

<template id="chat-module-template">
    <div class="chat-module" id="chat-module">
        <!-- Chat Messages Container -->
        <div class="chat-messages-container">
            <div id="chatMessages" class="chat-messages">
                <div class="chat-empty-state">
                    <i class="bi bi-chat-text"></i>
                    <p>開始與 AI 對話</p>
                </div>
            </div>
        </div>

        <!-- Chat Input Container -->
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <textarea 
                    class="chat-input" 
                    id="messageInput" 
                    placeholder="描述你想設計的角色..."
                    rows="2"
                    onkeydown="handleMessageKeydown(event)"></textarea>
                <button class="chat-send-btn" onclick="sendMessage()" title="發送訊息 (Ctrl+Enter)">
                    <i class="bi bi-send"></i>
                </button>
            </div>
        </div>
    </div>
</template>

<style>
/* ===== Chat Module CSS ===== */

.chat-module {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    background-color: #fff;
}

/* Messages Container */
.chat-messages-container {
    flex: 1;
    min-height: 0;
    overflow: hidden;
}

.chat-messages {
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    background-color: #f8f9fa;
    padding: 1rem;
    gap: 0.75rem;
}

.chat-empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #999;
    text-align: center;
}

.chat-empty-state i {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    opacity: 0.5;
}

.chat-empty-state p {
    font-size: 0.875rem;
    margin: 0;
}

/* Message Styles */
.message {
    display: flex;
    margin-bottom: 0;
    animation: fadeIn 0.25s ease-in;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.message-user {
    justify-content: flex-end;
}

.message-user .message-content {
    background-color: #0d6efd;
    color: white;
    text-align: right;
}

.message-assistant {
    justify-content: flex-start;
}

.message-assistant .message-content {
    background-color: white;
    border: 1px solid #dee2e6;
}

.message-content {
    display: inline-block;
    max-width: 75%;
    padding: 0.5rem 0.875rem;
    border-radius: 0.875rem;
    font-size: 0.9375rem;
    line-height: 1.4;
    word-wrap: break-word;
}

.message-user .message-content {
    border-bottom-right-radius: 0.125rem;
}

.message-assistant .message-content {
    border-bottom-left-radius: 0.125rem;
}

/* Input Container */
.chat-input-container {
    flex-shrink: 0;
    padding: 0.75rem 1rem;
    background-color: #f8f9fa;
    border-top: 1px solid #e0e0e0;
}

.chat-input-wrapper {
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
}

.chat-input {
    flex: 1;
    padding: 0.5rem 0.75rem;
    border: 1px solid #d0d0d0;
    border-radius: 0.25rem;
    font-size: 0.875rem;
    font-family: inherit;
    resize: vertical;
    max-height: 120px;
    min-height: 38px;
    transition: border-color 0.15s ease;
}

.chat-input:focus {
    outline: none;
    border-color: #0d6efd;
    box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.1);
}

.chat-send-btn {
    flex-shrink: 0;
    padding: 0.5rem 0.75rem;
    background-color: #0d6efd;
    color: white;
    border: 1px solid #0d6efd;
    border-radius: 0.25rem;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.15s ease;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.chat-send-btn:hover {
    background-color: #0b5ed7;
    border-color: #0b5ed7;
    transform: translateY(-1px);
}

.chat-send-btn:active {
    transform: translateY(0);
}

.chat-send-btn:disabled {
    background-color: #ccc;
    border-color: #ccc;
    cursor: not-allowed;
    opacity: 0.65;
}

/* Markdown Styles */
.message-content h1,
.message-content h2,
.message-content h3 {
    margin: 0.75rem 0 0.375rem 0;
    font-weight: 600;
}

.message-content h4,
.message-content h5,
.message-content h6 {
    margin: 0.5rem 0 0.25rem 0;
    font-weight: 600;
}

.message-content h1:first-child,
.message-content h2:first-child,
.message-content h3:first-child {
    margin-top: 0;
}

.message-content ul,
.message-content ol {
    margin: 0.375rem 0;
    padding-left: 1.25rem;
}

.message-content li {
    margin-bottom: 0.125rem;
}

.message-content code {
    background-color: #f8f9fa;
    padding: 0.125rem 0.25rem;
    border-radius: 0.25rem;
    font-size: 0.85rem;
    font-family: 'Courier New', monospace;
}

.message-content pre {
    background-color: #2d2d2d;
    color: #f8f8f2;
    padding: 0.625rem;
    border-radius: 0.375rem;
    overflow-x: auto;
    margin: 0.375rem 0;
    font-size: 0.8125rem;
}

.message-content pre code {
    background-color: transparent;
    color: inherit;
    padding: 0;
}

.message-timestamp {
    font-size: 0.7rem;
    color: #999;
    margin-top: 0.125rem;
}

.loading-spinner {
    display: inline-block;
    width: 0.875rem;
    height: 0.875rem;
    border: 1.5px solid rgba(13, 110, 253, 0.2);
    border-top-color: #0d6efd;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Responsive */
@media (max-width: 768px) {
    .message-content {
        max-width: 90%;
        font-size: 0.875rem;
    }
    
    .chat-messages {
        padding: 0.75rem;
    }
    
    .chat-input-container {
        padding: 0.5rem;
    }
}
</style>
