<!-- Image Generation Module - image-module.html -->
<!-- 這是一個獨立的模組化設計，可單獨優化和複用 -->

<template id="image-module-template">
    <div class="image-module" id="image-module">
        <!-- Parameters Panel -->
        <div class="image-params-panel">
            <div class="image-params-header">
                <h5>生成參數</h5>
            </div>
            <div class="image-params-content">
                <form id="imageForm" class="image-form">
                    <!-- Positive Prompt -->
                    <div class="image-form-group">
                        <label class="image-form-label">正向提示詞</label>
                        <textarea 
                            class="image-form-control" 
                            id="positivePrompt" 
                            placeholder="輸入正向提示詞..."
                            rows="3"></textarea>
                    </div>

                    <!-- Negative Prompt -->
                    <div class="image-form-group">
                        <label class="image-form-label">負向提示詞</label>
                        <textarea 
                            class="image-form-control" 
                            id="negativePrompt" 
                            placeholder="輸入負向提示詞...">EasyNegative,disconnected limbs,malformed limbs,Multiple people,(mutated hands and fingers:1.2),(extra arms:1.1),(poorly drawn face:1.1),malformed hands,grayscale,(poorly drawn hands:1.2),mutation,ugly,floating limbs,out of focus,normal quality,disfigured,lowres,blurry,worstquality,no_pupils,</textarea>
                    </div>

                    <!-- Dimensions -->
                    <div class="image-form-row">
                        <div class="image-form-col">
                            <label class="image-form-label">寬度</label>
                            <input type="number" class="image-form-control" id="imageWidth" value="608" min="256" max="2048" step="8">
                        </div>
                        <div class="image-form-col">
                            <label class="image-form-label">高度</label>
                            <input type="number" class="image-form-control" id="imageHeight" value="1328" min="256" max="2048" step="8">
                        </div>
                    </div>

                    <!-- Steps and CFG -->
                    <div class="image-form-row">
                        <div class="image-form-col">
                            <label class="image-form-label">Steps</label>
                            <input type="number" class="image-form-control" id="imageSteps" value="12" min="1" max="100">
                        </div>
                        <div class="image-form-col">
                            <label class="image-form-label">CFG</label>
                            <input type="number" class="image-form-control" id="imageCfg" value="1.0" min="0.1" max="30" step="0.1">
                        </div>
                    </div>

                    <!-- Seed -->
                    <div class="image-form-group">
                        <label class="image-form-label">Seed</label>
                        <input type="number" class="image-form-control" id="imageSeed" placeholder="留空為隨機">
                    </div>

                    <!-- Generate Button -->
                    <button type="button" class="image-generate-btn" onclick="generateImage()">
                        <i class="bi bi-magic"></i>生成圖片
                    </button>
                </form>
            </div>
        </div>

        <!-- Result Panel -->
        <div class="image-result-panel">
            <div class="image-result-header">
                <h5>生成結果</h5>
            </div>
            <div class="image-result-content">
                <div id="imageResult" class="image-result-container">
                    <div class="image-empty-state">
                        <i class="bi bi-image"></i>
                        <p>填寫參數後點擊「生成圖片」</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
